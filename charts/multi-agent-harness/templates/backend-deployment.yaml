apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multi-agent-harness.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multi-agent-harness.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "multi-agent-harness.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "multi-agent-harness.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "multi-agent-harness.fullname" .) }}
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: {{ include "multi-agent-harness.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "multi-agent-harness.fullname" . }}-config
            - secretRef:
                name: {{ include "multi-agent-harness.secretName" . }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: pi-auth
              mountPath: /pi-agent
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "multi-agent-harness.fullname" . }}-data
        - name: pi-auth
          persistentVolumeClaim:
            claimName: {{ include "multi-agent-harness.fullname" . }}-pi-auth
