name: Deploy to OCI

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  GHCR_PREFIX: ghcr.io/${{ github.repository_owner }}/multi-agent-harness

jobs:
  # ── 1. Provision VM (idempotent) ──────────────────────────────────────────
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Download Terraform state
        env:
          OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          oci os object get \
            --namespace ${{ secrets.OCI_NAMESPACE }} \
            --bucket-name ${{ vars.OCI_STATE_BUCKET }} \
            --name multi-agent-harness/terraform.tfstate \
            --file terraform/terraform.tfstate 2>/dev/null || echo "No existing state, starting fresh"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          TF_VAR_availability_domain_index: ${{ vars.OCI_AD_INDEX || '0' }}
        run: terraform apply -auto-approve

      - name: Upload Terraform state
        if: always()
        env:
          OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CLI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          STATE_FILE="terraform/terraform.tfstate"
          [ -f "terraform/errored.tfstate" ] && STATE_FILE="terraform/errored.tfstate"
          oci os object put \
            --namespace ${{ secrets.OCI_NAMESPACE }} \
            --bucket-name ${{ vars.OCI_STATE_BUCKET }} \
            --name multi-agent-harness/terraform.tfstate \
            --file "$STATE_FILE" \
            --force

  # ── 2. Build & push images ────────────────────────────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.GHCR_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.GHCR_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push agent-base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agents/base/Dockerfile.base
          push: true
          platforms: linux/arm64
          tags: ${{ env.GHCR_PREFIX }}/agent-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push agent-pi
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agents/pi/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.GHCR_PREFIX }}/agent-pi:latest
          build-args: |
            BASE_IMAGE=${{ env.GHCR_PREFIX }}/agent-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push agent-copilot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agents/copilot/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.GHCR_PREFIX }}/agent-copilot:latest
          build-args: |
            BASE_IMAGE=${{ env.GHCR_PREFIX }}/agent-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push planning-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: planning-agent/Dockerfile.wolfi
          push: true
          platforms: linux/arm64
          tags: ${{ env.GHCR_PREFIX }}/planning-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push sub-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sub-agent/Dockerfile.wolfi
          push: true
          platforms: linux/arm64
          tags: ${{ env.GHCR_PREFIX }}/sub-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [terraform, build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_CI_AUTH_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Wait for VM to be reachable
        run: |
          echo "Waiting for VM to be reachable via Tailscale..."
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              deploy@${{ vars.VM_TAILSCALE_HOST }} 'echo ok' 2>/dev/null && break
            echo "Attempt $i/30 failed, retrying in 10s..."
            sleep 10
          done

      - name: Write .env
        run: |
          cat > /tmp/harness.env << 'ENVEOF'
          GITHUB_TOKEN=${{ secrets.DEPLOY_GITHUB_TOKEN }}
          PORT=3000
          DATA_DIR=/app/data
          FRONTEND_PORT=9999
          AGENT_IMAGE_PREFIX=${{ env.GHCR_PREFIX }}
          SUB_AGENT_IMAGE=${{ env.GHCR_PREFIX }}/sub-agent:latest
          PLANNING_AGENT_IMAGE=${{ env.GHCR_PREFIX }}/planning-agent:latest
          SUB_AGENT_NETWORK=multi-agent-harness_harness-agents
          HARNESS_REPO_CACHE_VOLUME=harness-repo-cache
          GHCR_PREFIX=${{ env.GHCR_PREFIX }}
          PI_ENABLED=true
          ENVEOF

      - name: Copy compose files and env to VM
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.yml \
            docker-compose.prod.yml \
            /tmp/harness.env \
            deploy@${{ vars.VM_TAILSCALE_HOST }}:/opt/harness/
          ssh -o StrictHostKeyChecking=no deploy@${{ vars.VM_TAILSCALE_HOST }} \
            'mv /opt/harness/harness.env /opt/harness/.env'

      - name: Pull images and restart services
        run: |
          ssh -o StrictHostKeyChecking=no deploy@${{ vars.VM_TAILSCALE_HOST }} bash << 'SSHEOF'
            set -e
            cd /opt/harness
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
          SSHEOF
