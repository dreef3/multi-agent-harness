name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-github-copilot:
    name: E2E with GitHub Copilot
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
          COPILOT_GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
          PORT=3000
          DATA_DIR=/app/data
          SUB_AGENT_IMAGE=multi-agent-harness/sub-agent:latest
          SUB_AGENT_NETWORK=multi-agent-harness_harness-agents
          AGENT_PLANNING_MODEL=github-copilot/gpt-5-mini
          AGENT_IMPLEMENTATION_MODEL=github-copilot/gpt-5-mini
          JIRA_BASE_URL=
          JIRA_TOKEN=
          BITBUCKET_BASE_URL=
          BITBUCKET_TOKEN=
          FRONTEND_PORT=0
          EOF

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: multi-agent-harness/backend:latest
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          tags: multi-agent-harness/frontend:latest
          load: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build sub-agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./sub-agent/Dockerfile
          tags: multi-agent-harness/sub-agent:latest
          load: true
          cache-from: type=gha,scope=sub-agent
          cache-to: type=gha,scope=sub-agent,mode=max

      - name: Build planning-agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./planning-agent/Dockerfile
          tags: multi-agent-harness/planning-agent:latest
          load: true
          cache-from: type=gha,scope=planning-agent
          cache-to: type=gha,scope=planning-agent,mode=max

      - name: Seed Copilot auth into pi-agent volume
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: bash scripts/copy-copilot-auth.sh

      - name: Start services
        run: |
          docker compose up -d --no-build
          sleep 10
          docker compose ps

      - name: Set frontend URL
        run: |
          FRONTEND_PORT=$(docker compose port frontend 80 | cut -d: -f2)
          echo "HARNESS_URL=http://localhost:$FRONTEND_PORT" >> $GITHUB_ENV

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            echo "Waiting for backend... attempt $i/30"
            sleep 2
          done

      - name: Setup Bun for E2E tests
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install E2E test dependencies
        working-directory: ./e2e-tests
        run: bun install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e-tests/package.json') }}

      - name: Install Playwright browsers
        working-directory: ./e2e-tests
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        working-directory: ./e2e-tests
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run E2E tests
        working-directory: ./e2e-tests
        env:
          TEST_REPO_URL: git@github.com:dreef3/multi-agent-harness-test-repo.git
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          HARNESS_URL: ${{ env.HARNESS_URL }}
        run: bunx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-github-copilot
          path: e2e-tests/playwright-report/
          retention-days: 30

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose logs backend
          echo "=== Frontend logs ==="
          docker compose logs frontend

      - name: Stop services
        if: always()
        run: docker compose down -v
