name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-github-copilot:
    name: E2E with GitHub Copilot
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
          COPILOT_GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
          PORT=3000
          DATA_DIR=/app/data
          SUB_AGENT_IMAGE=multi-agent-harness/sub-agent:latest
          SUB_AGENT_NETWORK=multi-agent-harness_harness-agents
          AGENT_PLANNING_MODEL=github-copilot/gpt-5-mini
          AGENT_IMPLEMENTATION_MODEL=github-copilot/gpt-5-mini
          JIRA_BASE_URL=
          JIRA_TOKEN=
          BITBUCKET_BASE_URL=
          BITBUCKET_TOKEN=
          FRONTEND_PORT=0
          EOF

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: multi-agent-harness/backend:latest
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          tags: multi-agent-harness/frontend:latest
          load: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build sub-agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./sub-agent/Dockerfile
          tags: multi-agent-harness/sub-agent:latest
          load: true
          cache-from: type=gha,scope=sub-agent
          cache-to: type=gha,scope=sub-agent,mode=max

      - name: Build planning-agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./planning-agent/Dockerfile
          tags: multi-agent-harness/planning-agent:latest
          load: true
          cache-from: type=gha,scope=planning-agent
          cache-to: type=gha,scope=planning-agent,mode=max

      - name: Start services
        run: |
          docker compose up -d --no-build
          sleep 10
          docker compose ps

      - name: Set frontend URL
        run: |
          FRONTEND_PORT=$(docker compose port frontend 80 | cut -d: -f2)
          echo "HARNESS_URL=http://localhost:$FRONTEND_PORT" >> $GITHUB_ENV

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            echo "Waiting for backend... attempt $i/30"
            sleep 2
          done

      - name: Setup Bun for E2E tests
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install E2E test dependencies
        working-directory: ./e2e-tests
        run: bun install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e-tests/package.json') }}

      - name: Install Playwright browsers
        working-directory: ./e2e-tests
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        working-directory: ./e2e-tests
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run E2E tests
        working-directory: ./e2e-tests
        env:
          TEST_REPO_URL: git@github.com:dreef3/multi-agent-harness-test-repo.git
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_APPROVER_TOKEN: ${{ secrets.GH_APPROVER_TOKEN }}
          HARNESS_URL: ${{ env.HARNESS_URL }}
        run: bunx playwright test --ignore-glob="**/jenkins-integration.spec.ts"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-github-copilot
          path: e2e-tests/playwright-report/
          retention-days: 30

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose logs backend
          echo "=== Frontend logs ==="
          docker compose logs frontend
          echo "=== Planning agent container logs ==="
          docker ps -a --filter "name=planning-" --format "{{.Names}}" | grep -v "planning-agent-test" | \
            while read name; do
              echo "--- $name ---"
              docker logs "$name" 2>&1 || true
            done

      - name: Collect planning agent session logs
        if: failure()
        run: |
          mkdir -p /tmp/agent-sessions
          docker ps -a --filter "name=planning-" --format "{{.Names}}" | grep -v "planning-agent-test" | \
            while read name; do
              docker cp "$name:/pi-agent/sessions/." "/tmp/agent-sessions/$name/" 2>/dev/null || true
            done

      - name: Upload planning agent session logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-session-logs
          path: /tmp/agent-sessions/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down -v

  jenkins-integration:
    name: Jenkins CI Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build just the backend image (no agents needed for CI log tests)
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: multi-agent-harness/backend:latest
          load: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Prepare Jenkins init scripts
        run: |
          mkdir -p /tmp/jenkins-init
          # Groovy init script: disable setup wizard, create admin user,
          # allow anonymous read so the test needs no auth.
          cat > /tmp/jenkins-init/00-setup.groovy << 'GROOVY'
          import jenkins.model.*
          import hudson.security.*

          def instance = Jenkins.getInstanceOrNull()
          if (!instance) return

          // Allow full anonymous access so tests need no credentials.
          // UNSECURED means everyone (including anonymous) has full control.
          instance.setAuthorizationStrategy(AuthorizationStrategy.UNSECURED)
          instance.setSecurityRealm(SecurityRealm.NO_AUTHENTICATION)

          // Disable CSRF — simplifies REST API calls in tests
          instance.setCrumbIssuer(null)

          instance.save()
          GROOVY

          # Job DSL init script: create the test freestyle job
          cat > /tmp/jenkins-init/01-job.groovy << 'GROOVY'
          import jenkins.model.*
          import hudson.model.*
          import hudson.tasks.*

          def instance = Jenkins.getInstanceOrNull()
          if (!instance) return

          def jobName = 'harness-test-job'
          if (instance.getItem(jobName) != null) return

          def project = new FreeStyleProject(instance, jobName)
          project.buildersList.add(new Shell(
            'echo "HARNESS_CI_TEST_MARKER"\n' +
            'echo "Build number: $BUILD_NUMBER"\n' +
            'echo "Build completed at: $(date)"\n'
          ))
          instance.add(project, jobName)
          instance.save()
          GROOVY

      - name: Start Jenkins
        run: |
          docker run -d --name jenkins \
            -p 8080:8080 \
            -v /tmp/jenkins-init:/var/jenkins_home/init.groovy.d \
            -e JAVA_OPTS="-Djenkins.install.runSetupWizard=false" \
            jenkins/jenkins:lts-jdk21

      - name: Wait for Jenkins to be ready
        run: |
          echo "Waiting for Jenkins..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/api/json > /dev/null 2>&1; then
              echo "Jenkins is ready (attempt $i)"
              break
            fi
            echo "  attempt $i/40..."
            sleep 5
          done
          curl -sf http://localhost:8080/api/json || (echo "Jenkins did not start" && exit 1)

      - name: Verify test job was created
        run: |
          curl -sf http://localhost:8080/job/harness-test-job/api/json | python3 -c "
          import sys, json; d = json.load(sys.stdin); print('Job:', d['name'])
          "

      - name: Create harness .env with Jenkins config
        run: |
          cat > .env << EOF
          GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
          PORT=3000
          DATA_DIR=/app/data
          SUB_AGENT_IMAGE=multi-agent-harness/sub-agent:latest
          SUB_AGENT_NETWORK=multi-agent-harness_harness-agents
          AGENT_PLANNING_MODEL=github-copilot/gpt-5-mini
          AGENT_IMPLEMENTATION_MODEL=github-copilot/gpt-5-mini
          JENKINS_URL=http://host.docker.internal:8080
          FRONTEND_PORT=0
          EOF

      - name: Start harness backend only
        run: |
          docker compose up -d backend
          sleep 5
          # Wait for backend health
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 3
          done

      - name: Setup Bun for E2E tests
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install E2E test dependencies
        working-directory: ./e2e-tests
        run: bun install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache-jenkins
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e-tests/package.json') }}

      - name: Install Playwright browsers
        working-directory: ./e2e-tests
        if: steps.playwright-cache-jenkins.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        working-directory: ./e2e-tests
        if: steps.playwright-cache-jenkins.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run Jenkins integration tests
        working-directory: ./e2e-tests
        env:
          JENKINS_URL: http://localhost:8080
          # The harness container reaches Jenkins via host.docker.internal
          JENKINS_URL_FROM_HARNESS: http://host.docker.internal:8080
        run: bunx playwright test jenkins-integration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-jenkins
          path: e2e-tests/playwright-report/
          retention-days: 14

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose logs backend
          echo "=== Jenkins logs ==="
          docker logs jenkins | tail -100

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
          docker rm -f jenkins || true

  planning-agent-isolation:
    name: Planning Agent Isolation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build planning-agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./planning-agent/Dockerfile
          tags: multi-agent-harness/planning-agent:latest
          load: true
          cache-from: type=gha,scope=planning-agent
          cache-to: type=gha,scope=planning-agent,mode=max

      - name: Build sub-agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./sub-agent/Dockerfile
          tags: multi-agent-harness/sub-agent:latest
          load: true
          cache-from: type=gha,scope=sub-agent
          cache-to: type=gha,scope=sub-agent,mode=max

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run planning agent isolation tests
        working-directory: ./e2e-tests/planning-agent-tests
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          AGENT_PROVIDER: github-copilot
          AGENT_MODEL: gpt-5-mini
        run: bun test

      - name: Dump planning agent container logs on failure
        if: failure()
        run: |
          docker ps -a --filter "name=planning-agent-test" --format "{{.Names}}" | \
            xargs -I{} sh -c 'echo "=== {} ===" && docker logs {}'

      - name: Cleanup leftover test containers
        if: always()
        run: |
          docker ps -a --filter "name=planning-agent-test" --format "{{.Names}}" | \
            xargs -r docker rm -f
