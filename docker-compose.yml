services:
  backend:
    build: ./backend
    image: multi-agent-harness/backend:latest
    ports:
      - "3000:3000"
    volumes:
      - harness-data:/app/data
      - harness-pi-auth:/pi-agent
    env_file:
      - .env
    environment:
      DOCKER_PROXY_URL: http://docker-proxy:2375
    depends_on:
      - docker-proxy

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1.2
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build: ./frontend
    image: multi-agent-harness/frontend:latest
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

networks:
  harness-agents:
    driver: bridge
    internal: false

volumes:
  harness-data:
    name: harness-data
  harness-pi-auth:
    name: harness-pi-auth
