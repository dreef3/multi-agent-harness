services:
  backend:
    build: ./backend
    image: multi-agent-harness/backend:latest
    ports:
      - "3000:3000"
    volumes:
      - harness-data:/app/data
      - harness-pi-auth:/pi-agent
    env_file:
      - .env
    environment:
      DOCKER_PROXY_URL: http://docker-proxy:2375
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      OTEL_SERVICE_NAME: multi-agent-harness
      WAIT_FOR_CI: ${WAIT_FOR_CI:-false}
      CI_WAIT_TIMEOUT_MS: ${CI_WAIT_TIMEOUT_MS:-600000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docker-proxy
    networks:
      - default
      - harness-agents

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.1.2
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      EVENTS: 1        # required for docker.getEvents() used by watchContainerExit
      # NETWORKS intentionally omitted — harness-agents network is managed by compose,
      # not by the backend. Re-enable if the backend ever creates networks dynamically.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  frontend:
    build: ./frontend
    image: multi-agent-harness/frontend:latest
    ports:
      - "${FRONTEND_PORT:-9999}:80"
    depends_on:
      - backend

  planning-agent:
    build:
      context: .
      dockerfile: planning-agent/Dockerfile
    image: multi-agent-harness/planning-agent:latest
    profiles:
      - build-only  # prevents this from being started by docker compose up

  sub-agent:
    build:
      context: .
      dockerfile: sub-agent/Dockerfile
    image: multi-agent-harness/sub-agent:latest
    profiles:
      - build-only  # prevents this from being started by docker compose up

  postgres:
    image: postgres:16-alpine
    profiles:
      - enterprise
    environment:
      POSTGRES_DB: harness
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harness}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - harness-postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

networks:
  harness-agents:
    driver: bridge
    internal: false

volumes:
  harness-data:
    name: harness-data
  harness-pi-auth:
    name: harness-pi-auth
  harness-repo-cache:
    name: harness-repo-cache
  harness-postgres:
